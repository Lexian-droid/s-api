<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /app

    <Directory /app>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Route all requests through index.php
        FallbackResource /app/index.php
    </Directory>

    # Serve generated TTS audio files directly.
    Alias /tts /tts
    <Directory /tts>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/tts_error.log
    CustomLog ${APACHE_LOG_DIR}/tts_access.log combined
</VirtualHost>
